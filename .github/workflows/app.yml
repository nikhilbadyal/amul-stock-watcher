# .github/workflows/app.yml

name: Product Availability Checker

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [check-availability]
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Force notification regardless of previous state"
        required: false
        type: boolean
        default: false
      DEBUG_ENABLED:
        type: boolean
        description: "Run the build with tmate debugging enabled."
        required: false
        default: false

jobs:
  check-product:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Cache Chrome and ChromeDriver
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/selenium
            /usr/bin/google-chrome*
            /usr/bin/chromedriver*
          key: chrome-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt --disable-pip-version-check

      - name: Create .env file
        run: |
          echo "${{ secrets.ENVS }}" > .env
          if [ "${{ github.event.inputs.force_notify }}" = "true" ]; then
            echo "FORCE_NOTIFY=true" >> .env
          fi

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3.24
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.DEBUG_ENABLED }}
        with:
          detached: true

      - name: Run script
        run: python main.py
        env:
          # Optimize Chrome for CI
          CHROME_NO_SANDBOX: "true"
          CHROME_DISABLE_GPU: "true"
